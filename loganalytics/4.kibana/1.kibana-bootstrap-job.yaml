---
# ─────────────────────────────────────────────────────────────────────────────
# kibana-bootstrap-job.yaml
#
# One-shot Job: creates Kibana Data Views (index patterns) for every
# Filebeat index. Re-run after adding a new app:
#
#   kubectl delete job kibana-bootstrap -n logging
#   kubectl apply  -f kibana-bootstrap-job.yaml
#
# Registered data views:
#   filebeat-golang-prometheus-demo-*
#   filebeat-java-prometheus-demo-*
#   filebeat-python-prometheus-demo-*
#   filebeat-generic-*
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-bootstrap
  namespace: logging
  labels:
    app: kibana-bootstrap
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kibana
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kibana to become available..."
              until curl -sf \
                    http://kibana.logging.svc.cluster.local:5601/kibana/api/status \
                    -H 'kbn-xsrf: true' | grep -q '"level":"available"'; do
                echo "  Kibana not ready - retrying in 10s"
                sleep 10
              done
              echo "Kibana is ready."
      containers:
        - name: bootstrap
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              KIBANA="http://kibana.logging.svc.cluster.local:5601/kibana"

              # ── Helper: create a data view ──────────────────────────────
              # Args: <title> <id> <timeFieldName>
              create_dataview() {
                local TITLE="$1"
                local ID="$2"
                local TS_FIELD="$3"
                echo "-> Creating data view: ${TITLE}"
                HTTP_CODE=$(curl -s -o /tmp/curl_out -w "%{http_code}" \
                  -X POST "${KIBANA}/api/data_views/data_view" \
                  -H "kbn-xsrf: true" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"data_view\": {
                      \"id\":            \"${ID}\",
                      \"title\":         \"${TITLE}\",
                      \"timeFieldName\": \"${TS_FIELD}\"
                    }
                  }")
                case "$HTTP_CODE" in
                  200|201) echo "  OK Created: ${TITLE}" ;;
                  409)     echo "  -- Already exists (skipping): ${TITLE}" ;;
                  *)       echo "  ERR Failed (HTTP ${HTTP_CODE}): ${TITLE}"; cat /tmp/curl_out ;;
                esac
              }

              # ── Data views ──────────────────────────────────────────────
              # Add one create_dataview call per new app registered in
              # filebeat-config-full.yaml.
              # Convention: id = "filebeat-<app-name>"
              #             title = "filebeat-<app-name>-*"

              create_dataview \
                "filebeat-golang-prometheus-demo-*" \
                "filebeat-golang-prometheus-demo" \
                "@timestamp"

              create_dataview \
                "filebeat-java-prometheus-demo-*" \
                "filebeat-java-prometheus-demo" \
                "@timestamp"

              create_dataview \
                "filebeat-python-prometheus-demo-*" \
                "filebeat-python-prometheus-demo" \
                "@timestamp"

              create_dataview \
                "filebeat-generic-*" \
                "filebeat-generic" \
                "@timestamp"

              echo ""
              echo "Bootstrap complete."
